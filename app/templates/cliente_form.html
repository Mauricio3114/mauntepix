{% extends "base.html" %}
{% block content %}

<style>
.form-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:16px;
    flex-wrap:wrap;
    margin-bottom:24px;
}

.form-header h1{
    margin:0;
    font-size:34px;
    color:#0f172a;
}

.form-header p{
    margin:6px 0 0;
    color:#64748b;
}

.btn-voltar{
    background:#0f172a;
    color:#fff;
    padding:12px 18px;
    border-radius:14px;
    text-decoration:none;
    font-weight:900;
}

.form-card{
    background:#fff;
    border-radius:28px;
    padding:28px;
    box-shadow:0 18px 45px rgba(15,23,42,.08);
    border:1px solid #e5e7eb;
}

.section-title{
    margin:0 0 18px;
    font-size:18px;
    color:#0f172a;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(12,1fr);
    gap:18px;
    margin-bottom:26px;
}

.field{
    display:flex;
    flex-direction:column;
    gap:7px;
}

.field label{
    font-weight:800;
    color:#334155;
    font-size:14px;
}

.field input,
.field textarea{
    width:100%;
    padding:14px 15px;
    border:1px solid #d1d5db;
    border-radius:14px;
    font-size:15px;
    box-sizing:border-box;
    outline:none;
    background:#f8fafc;
}

.field input:focus,
.field textarea:focus{
    border-color:#32BC7E;
    background:#fff;
    box-shadow:0 0 0 4px rgba(50,188,126,.12);
}

.col-12{grid-column:span 12;}
.col-8{grid-column:span 8;}
.col-5{grid-column:span 5;}
.col-6{grid-column:span 6;}
.col-7{grid-column:span 7;}
.col-6{grid-column:span 6;}
.col-4{grid-column:span 4;}
.col-3{grid-column:span 3;}
.col-2{grid-column:span 2;}

.actions{
    display:flex;
    justify-content:flex-end;
    gap:12px;
    flex-wrap:wrap;
    border-top:1px solid #e5e7eb;
    padding-top:22px;
}

.btn-save{
    background:#32BC7E;
    color:#fff;
    border:none;
    padding:14px 24px;
    border-radius:14px;
    font-weight:900;
    cursor:pointer;
    font-size:15px;
}

.btn-cancel{
    background:#f1f5f9;
    color:#0f172a;
    padding:14px 22px;
    border-radius:14px;
    text-decoration:none;
    font-weight:900;
}

.cep-status{
    font-size:13px;
    color:#64748b;
    margin-top:4px;
}

@media(max-width:800px){
    .form-card{
        padding:20px;
        border-radius:22px;
    }

    .form-grid{
        grid-template-columns:1fr;
        gap:14px;
    }

    .col-12,
    .col-8,
    .col-6,
    .col-4,
    .col-3,
    .col-2{
        grid-column:span 1;
    }

    .form-header h1{
        font-size:28px;
    }

    .actions{
        flex-direction:column-reverse;
    }

    .btn-save,
    .btn-cancel{
        width:100%;
        text-align:center;
        box-sizing:border-box;
    }
}
</style>

<div class="form-header">
    <div>
        <h1>{% if cliente %}Editar Cliente{% else %}Novo Cliente{% endif %}</h1>
        <p>Cadastre os dados pessoais, contato e endereço do cliente.</p>
    </div>

    <a href="{{ url_for('clientes.listar_clientes') }}" class="btn-voltar">← Voltar</a>
</div>

<form method="POST" class="form-card">

    <h3 class="section-title">Dados pessoais</h3>

    <div class="form-grid">
        <div class="field col-8">
            <label>Nome completo *</label>
            <input name="nome" required placeholder="Ex: João da Silva"
                   value="{{ cliente.nome if cliente else '' }}">
        </div>

        <div class="field col-4">
            <label>CPF *</label>
            <input name="cpf" id="cpf" required maxlength="14" placeholder="000.000.000-00"
                   value="{{ cliente.cpf if cliente else '' }}">
        </div>

        <div class="field col-4">
            <label>RG</label>
            <input name="rg" placeholder="RG"
                   value="{{ cliente.rg if cliente else '' }}">
        </div>

        <div class="field col-4">
            <label>Telefone *</label>
            <input name="telefone" id="telefone" required maxlength="15" placeholder="(85) 99999-9999"
                   value="{{ cliente.telefone if cliente else '' }}">
        </div>

        <div class="field col-4">
            <label>WhatsApp</label>
            <input name="whatsapp" id="whatsapp" maxlength="15" placeholder="(85) 99999-9999"
                   value="{{ cliente.whatsapp if cliente else '' }}">
        </div>

        <div class="field col-12">
            <label>E-mail</label>
            <input type="email" name="email" placeholder="cliente@email.com"
                   value="{{ cliente.email if cliente else '' }}">
        </div>
    </div>

    <h3 class="section-title">Endereço</h3>

    <div class="form-grid">
        <div class="field col-3">
            <label>CEP</label>
            <input name="cep" id="cep" maxlength="9"
                placeholder="00000-000"
                value="{{ cliente.cep if cliente else '' }}">
            <span id="cepStatus" class="cep-status"></span>
        </div>

        <div class="field col-6">
            <label>Rua / Avenida</label>
            <input name="logradouro" id="logradouro"
                placeholder="Rua / Avenida"
                value="{{ cliente.logradouro if cliente else '' }}">
        </div>

        <div class="field col-3">
            <label>Número</label>
            <input name="numero"
                placeholder="Nº"
                value="{{ cliente.numero if cliente else '' }}">
        </div>

        <div class="field col-4">
            <label>Bairro</label>
            <input name="bairro" id="bairro" placeholder="Bairro"
                   value="{{ cliente.bairro if cliente else '' }}">
        </div>

        <div class="field col-4">
            <label>Cidade</label>
            <input name="cidade" id="cidade" placeholder="Cidade"
                   value="{{ cliente.cidade if cliente else '' }}">
        </div>

        <div class="field col-4">
            <label>Estado</label>
            <input name="estado" id="estado" maxlength="2" placeholder="UF"
                   value="{{ cliente.estado if cliente else '' }}">
        </div>

        <div class="field col-12">
            <label>Complemento</label>
            <input name="complemento" placeholder="Apartamento, casa, referência..."
                   value="{{ cliente.complemento if cliente else '' }}">
        </div>

        <input type="hidden" name="endereco" id="endereco"
               value="{{ cliente.endereco if cliente else '' }}">
    </div>

    <div class="actions">
        <a href="{{ url_for('clientes.listar_clientes') }}" class="btn-cancel">Cancelar</a>
        <button type="submit" class="btn-save">Salvar Cliente</button>
    </div>

</form>

<script>
function apenasNumeros(v){
    return String(v || "").replace(/\D/g, "");
}

function maskCEP(v){
    v = apenasNumeros(v).slice(0, 8);
    return v.replace(/(\d{5})(\d)/, "$1-$2");
}

const cep = document.getElementById("cep");
const cepStatus = document.getElementById("cepStatus");

cep.addEventListener("input", e => {
    e.target.value = maskCEP(e.target.value);
});

cep.addEventListener("blur", buscarCep);
cep.addEventListener("change", buscarCep);

function buscarCep(){
    let cepLimpo = apenasNumeros(cep.value);

    if(cepLimpo.length !== 8){
        cepStatus.innerText = "CEP incompleto.";
        return;
    }

    cepStatus.innerText = "Buscando endereço...";

    fetch(`https://viacep.com.br/ws/${cepLimpo}/json/`)
        .then(res => res.json())
        .then(data => {
            if(data.erro){
                cepStatus.innerText = "CEP não encontrado.";
                return;
            }

            document.getElementById("logradouro").value = data.logradouro || "";
            document.getElementById("bairro").value = data.bairro || "";
            document.getElementById("cidade").value = data.localidade || "";
            document.getElementById("estado").value = data.uf || "";

            cepStatus.innerText = "Endereço preenchido.";
            montarEndereco();
        })
        .catch(() => {
            cepStatus.innerText = "Erro ao buscar CEP.";
        });
}

function montarEndereco(){
    const logradouro = document.getElementById("logradouro").value || "";
    const numero = document.querySelector("[name='numero']").value || "";
    const bairro = document.getElementById("bairro").value || "";
    const cidade = document.getElementById("cidade").value || "";
    const estado = document.getElementById("estado").value || "";

    document.getElementById("endereco").value =
        `${logradouro}, ${numero} - ${bairro}, ${cidade}/${estado}`;
}

document.querySelectorAll("input").forEach(input => {
    input.addEventListener("input", montarEndereco);
});
</script>

{% endblock %}
