{% extends "base.html" %}

{% block content %}

<div style="max-width:420px;margin:70px auto;background:#fff;padding:32px;border-radius:24px;box-shadow:0 15px 35px rgba(15,23,42,.12);">

    <h1 style="margin:0 0 8px;">Entrar</h1>
    <p style="color:#64748b;margin-bottom:24px;">Acesse sua conta MauntePix</p>

    <form method="POST" action="{{ url_for('auth.login') }}">
        <label>E-mail</label>
        <input type="email" name="email" required
               style="width:100%;padding:14px;border:1px solid #ddd;border-radius:12px;margin:8px 0 16px;box-sizing:border-box;">

        <label>Senha</label>
        <input type="password" name="senha" required
               style="width:100%;padding:14px;border:1px solid #ddd;border-radius:12px;margin:8px 0 22px;box-sizing:border-box;">

        <button type="submit"
                style="width:100%;background:#32BC7E;color:#fff;border:0;border-radius:12px;padding:14px;font-weight:800;cursor:pointer;">
            Entrar
        </button>
    </form>

</div>

{% endblock %}
