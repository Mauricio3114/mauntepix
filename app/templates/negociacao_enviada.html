<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Solicitação Enviada</title>

<style>

body{
    background:#f4f7f8;
    font-family:Segoe UI,sans-serif;
}

.card{
    max-width:600px;
    margin:80px auto;
    background:white;
    border-radius:30px;
    padding:40px;
    text-align:center;
    box-shadow:0 20px 45px rgba(15,23,42,.08);
}

h1{
    color:#16a34a;
}

p{
    color:#64748b;
}

.btn{
    display:inline-block;
    margin-top:20px;
    background:#32BC7E;
    color:white;
    text-decoration:none;
    padding:14px 22px;
    border-radius:14px;
    font-weight:900;
}

</style>
</head>
<body>

<div class="card">

    <h1>✅ Solicitação enviada</h1>

    <p>
        Recebemos sua solicitação de negociação.
        Nossa equipe irá analisar e entrar em contato.
    </p>

    <a
    href="{{ url_for('portal.portal_cliente', token=cliente.token_portal) }}"
    class="btn">

        Voltar ao Portal

    </a>

</div>

</body>
</html>
