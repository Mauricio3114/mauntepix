<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Negociar Dívida</title>

<style>

body{
    background:#f4f7f8;
    font-family:Segoe UI,sans-serif;
    margin:0;
}

.container{
    max-width:700px;
    margin:40px auto;
    padding:20px;
}

.card{
    background:white;
    border-radius:28px;
    padding:30px;
    box-shadow:0 20px 45px rgba(15,23,42,.08);
}

h1{
    margin-top:0;
    color:#0f172a;
}

p{
    color:#64748b;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:800;
}

select,input,textarea{
    width:100%;
    padding:15px;
    border:1px solid #dbe2ea;
    border-radius:14px;
    margin-bottom:18px;
    box-sizing:border-box;
}

textarea{
    min-height:120px;
    resize:none;
}

.btn{
    width:100%;
    border:none;
    background:#32BC7E;
    color:white;
    font-size:16px;
    font-weight:900;
    padding:16px;
    border-radius:16px;
    cursor:pointer;
}

</style>
</head>
<body>

<div class="container">

    <div class="card">

        <h1>🤝 Solicitar Negociação</h1>

        <p>
            Escolha o tipo de negociação desejada.
        </p>

        <form method="POST">

            <label>Tipo</label>

            <select name="tipo" required>

                <option value="pagamento_avulso">
                    Pagamento Avulso
                </option>

                <option value="somente_juros">
                    Pagar Somente Juros
                </option>

                <option value="acordo">
                    Fazer Acordo
                </option>

                <option value="reparcelamento">
                    Reparcelamento
                </option>

            </select>

            <label>Valor Proposto</label>

            <input
                type="number"
                step="0.01"
                name="valor">

            <label>Observação</label>

            <textarea
                name="observacao"
                placeholder="Explique sua proposta..."></textarea>

            <button type="submit" class="btn">
                Enviar Solicitação
            </button>

        </form>

    </div>

</div>

</body>
</html>
