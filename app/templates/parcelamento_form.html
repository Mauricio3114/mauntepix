{% extends "base.html" %}
{% block content %}

<style>
.form-head{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:24px}
.form-head h1{margin:0;font-size:34px}
.btn-back{background:#0f172a;color:#fff;padding:12px 18px;border-radius:14px;text-decoration:none;font-weight:900}
.form-card{background:#fff;border-radius:28px;padding:28px;box-shadow:0 18px 45px rgba(15,23,42,.08)}
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:18px}
.field{display:flex;flex-direction:column;gap:7px}
.field label{font-weight:900;color:#334155}
.field input,.field select{padding:14px;border:1px solid #d1d5db;border-radius:14px;background:#f8fafc;font-size:15px}
.col-12{grid-column:span 12}.col-6{grid-column:span 6}.col-4{grid-column:span 4}
.simulador{margin-top:24px;background:#f8fafc;border:1px solid #e5e7eb;border-radius:22px;padding:22px}
.sim-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.sim-card{background:#fff;padding:18px;border-radius:18px;border:1px solid #e5e7eb}
.sim-card small{color:#64748b;font-weight:900}
.sim-card h3{margin:8px 0 0;font-size:24px}
.actions{display:flex;justify-content:flex-end;gap:12px;margin-top:24px;border-top:1px solid #e5e7eb;padding-top:22px}
.btn-save{background:#32BC7E;color:#fff;border:0;padding:14px 24px;border-radius:14px;font-weight:900}
.btn-cancel{background:#f1f5f9;color:#0f172a;padding:14px 22px;border-radius:14px;text-decoration:none;font-weight:900}
@media(max-width:800px){.grid,.sim-grid{grid-template-columns:1fr}.col-12,.col-6,.col-4{grid-column:span 1}.actions{flex-direction:column-reverse}.btn-save,.btn-cancel{width:100%;text-align:center;box-sizing:border-box}}
</style>

<div class="form-head">
    <div>
        <h1>Novo Parcelamento</h1>
        <p>Informe valor, juros, quantidade de parcelas e vencimentos.</p>
    </div>
    <a href="{{ url_for('emprestimos.parcelamentos') }}" class="btn-back">← Voltar</a>
</div>

<form method="POST" class="form-card">
    <div class="grid">
        <div class="field col-12">
            <label>Cliente *</label>
            <select name="cliente_id" required>
                <option value="">Selecione o cliente</option>
                {% for c in clientes %}
                    <option value="{{ c.id }}">{{ c.nome }} - {{ c.cpf }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="field col-4">
            <label>Valor emprestado *</label>
            <input name="valor_liberado" id="valor_liberado" required placeholder="1.000,00">
        </div>

        <div class="field col-4">
            <label>Juros % *</label>
            <input name="percentual_juros" id="percentual_juros" required placeholder="20">
        </div>

        <div class="field col-4">
            <label>Quantidade de parcelas *</label>
            <input type="number" name="quantidade_parcelas" id="quantidade_parcelas" min="1" required placeholder="6">
        </div>

        <div class="field col-4">
            <label>Periodicidade *</label>
            <select name="periodicidade" required>
                <option value="diario">Diário</option>
                <option value="semanal">Semanal</option>
                <option value="quinzenal">Quinzenal</option>
                <option value="dez_dias">A cada 10 dias</option>
                <option value="mensal">Mensal</option>
            </select>
        </div>

        <div class="field col-4">
            <label>Multa por dia de atraso *</label>
            <input name="multa_dia" id="multa_dia" required placeholder="5,00" value="0,00">
        </div>

        <div class="field col-4">
            <label>Data da 1ª parcela *</label>
            <input type="date" name="data_inicio" required>
        </div>
    </div>

    <div class="simulador">
        <h3>Simulação</h3>
        <div class="sim-grid">
            <div class="sim-card">
                <small>Valor liberado</small>
                <h3 id="simValor">R$ 0,00</h3>
            </div>
            <div class="sim-card">
                <small>Juros</small>
                <h3 id="simJuros">R$ 0,00</h3>
            </div>
            <div class="sim-card">
                <small>Total</small>
                <h3 id="simTotal">R$ 0,00</h3>
            </div>
            <div class="sim-card">
                <small>Valor da parcela</small>
                <h3 id="simParcela">R$ 0,00</h3>
            </div>
        </div>
    </div>

    <div class="actions">
        <a href="{{ url_for('emprestimos.parcelamentos') }}" class="btn-cancel">Cancelar</a>
        <button class="btn-save" type="submit">Gerar Parcelamento</button>
    </div>
</form>

<script>
function moedaParaNumero(v){
    v = String(v || "").replace(/\./g, "").replace(",", ".");
    return parseFloat(v) || 0;
}
function formatBRL(v){
    return v.toLocaleString("pt-BR", {style:"currency", currency:"BRL"});
}
function simular(){
    const valor = moedaParaNumero(document.getElementById("valor_liberado").value);
    const jurosPerc = moedaParaNumero(document.getElementById("percentual_juros").value);
    const qtd = parseInt(document.getElementById("quantidade_parcelas").value) || 0;

    const juros = valor * jurosPerc / 100;
    const total = valor + juros;
    const parcela = qtd > 0 ? total / qtd : 0;

    document.getElementById("simValor").innerText = formatBRL(valor);
    document.getElementById("simJuros").innerText = formatBRL(juros);
    document.getElementById("simTotal").innerText = formatBRL(total);
    document.getElementById("simParcela").innerText = formatBRL(parcela);
}
["valor_liberado","percentual_juros","quantidade_parcelas"].forEach(id=>{
    document.getElementById(id).addEventListener("input", simular);
});
</script>

{% endblock %}
